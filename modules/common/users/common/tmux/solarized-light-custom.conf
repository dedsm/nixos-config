# Inactive pane styling for solarized light
# base3 (#fdf6e3) = active, base2 (#eee8d5) = inactive (slightly darker)
# set -g window-style 'bg=#eee8d5'
# set -g window-active-style 'bg=#fdf6e3'

# After a pane is created, wait briefly then unset per-pane window-style
# overrides (e.g. set by Claude Code) so global window-style bg applies
set-hook -g after-split-window {run-shell -b 'sleep 2; for p in $(tmux list-panes -F "##{pane_id}"); do tmux set-option -up -t "$p" window-style; tmux set-option -up -t "$p" window-active-style; done'}
