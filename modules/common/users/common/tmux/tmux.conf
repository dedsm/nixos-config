# Titles
set -g set-titles on

# Clear screen with prefix + C-l (since C-l is used by vim-tmux-navigator)
bind C-l send-keys 'C-l'

# mouse mode (scroll to enter copy mode, click to select panes/windows, drag to resize)
set -g mouse on

bind-key m set-option -g mouse on \; display 'Mouse: ON'
bind-key M set-option -g mouse off \; display 'Mouse: OFF'

# new tab in CWD
bind c new-window -c "#{pane_current_path}"
# better split window bindings
bind \\ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# PREFIX+r to reload tmux config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux config"

# Monitor activity on other windows

setw -g monitor-activity on
set -g visual-activity on

# CTRL+arrows working

setw -g xterm-keys on

# Default main pane sizes

setw -g other-pane-height 15
setw -g other-pane-width 60

# vi-mode for copy mode

setw -g mode-keys vi
unbind p
bind p paste-buffer

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# better resizing (prefix + h/j/k/l)
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# swap pane with previous/next (prefix + J/K)
bind -r J swap-pane -D
bind -r K swap-pane -U

# rotate panes (prefix + H/L)
bind -r H rotate-window -D
bind -r L rotate-window -U

# send focus events (for use in vim)
set -g focus-events on
